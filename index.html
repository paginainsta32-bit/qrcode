<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
}

/* CONTAINER */
.slideshow-container {
    position: relative;
    width: 90%;
    max-width: 360px;
    aspect-ratio: 9/16;
    border-radius: 40px;
    border: 10px solid #111;
    overflow: hidden;
    box-shadow: 0 0 100px rgba(255,0,80,0.2);
}

/* SLIDES */
.mySlides {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1.5s ease;
}
.mySlides.active {
    opacity: 1;
}
.mySlides img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    animation: zoom 10s ease-in-out infinite alternate;
}

@keyframes zoom {
    from { transform: scale(1); }
    to { transform: scale(1.15); }
}

/* OVERLAY */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.9));
    z-index: 2;
}

/* TEXTO TRAILER */
.texto {
    position: absolute;
    bottom: 50px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 24px;
    z-index: 3;
    opacity: 0;
    transition: all 1s ease;
    text-shadow: 0 0 20px rgba(255,255,255,0.7);
}

/* FINAL */
.final {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    opacity: 0;
    z-index: 10;
    transition: opacity 2s ease;
}

/* BOTÃO */
.music-btn {
    position: absolute;
    top: 40px;
    right: 15px;
    z-index: 6;
    background: rgba(0,0,0,0.5);
    border: none;
    color: white;
    font-size: 18px;
    border-radius: 50%;
    width: 45px;
    height: 45px;
    cursor: pointer;
}

/* CORAÇÕES */
.heart {
    position: absolute;
    color: rgba(255,0,80,0.5);
    animation: cair linear infinite;
}
@keyframes cair {
    from { transform: translateY(-10vh); }
    to { transform: translateY(110vh); }
}

/* PARTÍCULAS */
.particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    opacity: 0.5;
    animation: float 6s linear infinite;
}
@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div class="slideshow-container">

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<div class="mySlides active"><img src="https://lh3.googleusercontent.com/u/0/d/1Aiv7jlcJofdfB5UAH_OgH3EK6OMT0Tb9"></div>
<div class="mySlides"><img src="https://lh3.googleusercontent.com/u/0/d/14XnBecqBw5M7zBYLi9oflWshnzPGWhyU"></div>
<div class="mySlides"><img src="https://lh3.googleusercontent.com/u/0/d/1h157paw7MwPRkG-_zPoxbT43t6u4Virj"></div>
<div class="mySlides"><img src="https://lh3.googleusercontent.com/u/0/d/18CFXy7S0cnk6jaC3ssAgYud3d7gKJ8e9"></div>
<div class="mySlides"><img src="https://lh3.googleusercontent.com/u/0/d/1lHoH1y9AzUlmYjo6QXkbKiuPiqeH0Bpj"></div>
<div class="mySlides"><img src="https://lh3.googleusercontent.com/u/0/d/1QXXgi4Da9WYgV9nx60k735RYmH6lsiok"></div>

<div class="overlay"></div>

<div class="texto" id="texto"></div>

<div class="final" id="final">
    Eu te amo para sempre ❤️
</div>

</div>

<audio id="musica" loop preload="auto">
<source src="https://dl.dropboxusercontent.com/scl/fi/baus93geh0hle1pb50rok/02-Vou-Te-Amar-Cigana-Mentes-Tao-Bem.mp3?rlkey=lrrw2c9fad5ex7l2htqmpnojt&st=i2th53d9">
</audio>

<script>
const frases = [
    "Em um mundo comum...",
    "algo extraordinário aconteceu.",
    "Eu encontrei você.",
    "E tudo mudou."
];

let i = 0;
let slide = 0;
const slides = document.querySelectorAll(".mySlides");
const texto = document.getElementById("texto");
const final = document.getElementById("final");

/* RITMO DE TRAILER */
function rodarTrailer() {
    if (i < frases.length) {
        slides.forEach(s => s.classList.remove("active"));
        slide = (slide + 1) % slides.length;
        slides[slide].classList.add("active");

        texto.style.opacity = 0;
        setTimeout(() => {
            texto.textContent = frases[i];
            texto.style.opacity = 1;
        }, 400);

        i++;
        setTimeout(rodarTrailer, 2500); // ritmo inicial
    } else {
        /* FINAL CINEMATOGRÁFICO */
        texto.style.opacity = 0;
        setTimeout(() => {
            final.style.opacity = 1;
        }, 1500);
    }
}

setTimeout(rodarTrailer, 2000);

/* CORAÇÕES */
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=(Math.random()*3+3)+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},400);

/* PARTÍCULAS */
setInterval(()=>{
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),6000);
},300);

/* MÚSICA */
const audio=document.getElementById("musica");

function toggleMusic(){
    if(audio.paused){
        audio.volume=0;
        audio.play();
        let v=0;
        let fade=setInterval(()=>{
            v+=0.05;
            audio.volume=v;
            if(v>=1) clearInterval(fade);
        },100);
    } else {
        audio.pause();
    }
}

document.addEventListener("click",()=>audio.play(),{once:true});
</script>

</body>
</html>

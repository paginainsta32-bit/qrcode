<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
}

/* CONTAINER */
.slideshow-container{
    position:relative;
    width:90%;
    max-width:360px;
    aspect-ratio:9/16;
    border-radius:40px;
    border:10px solid #111;
    overflow:hidden;
    box-shadow:0 0 120px rgba(255,0,80,0.25);
}

/* SLIDES */
.mySlides{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    transition:opacity 1s ease;
}
.mySlides.active{opacity:1;}

.mySlides img{
    width:100%;
    height:100%;
    object-fit:cover;
    animation:zoom 12s ease-in-out infinite alternate;
}

@keyframes zoom{
    from{transform:scale(1);}
    to{transform:scale(1.2);}
}

/* TEXTO */
.texto{
    position:absolute;
    bottom:60px;
    width:100%;
    text-align:center;
    color:white;
    font-size:24px;
    opacity:0;
    z-index:5;
    transition:all 0.8s ease;
    text-shadow:0 0 20px rgba(255,255,255,0.8);
}

/* NOME */
.casal{
    position:absolute;
    top:50%;
    width:100%;
    text-align:center;
    transform:translateY(-50%);
    font-size:32px;
    color:white;
    letter-spacing:3px;
    opacity:0;
    z-index:6;
    text-shadow:0 0 25px rgba(255,255,255,0.9);
    transition:opacity 2s ease;
}

/* FINAL */
.final{
    position:absolute;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:30px;
    opacity:0;
    z-index:10;
    transition:opacity 2s ease;
}

.sub{
    font-size:16px;
    opacity:0.7;
    margin-top:10px;
}

/* BOTÃO */
.music-btn{
    position:absolute;
    top:40px;
    right:15px;
    z-index:6;
    background:rgba(0,0,0,0.5);
    border:none;
    color:white;
    font-size:18px;
    border-radius:50%;
    width:45px;
    height:45px;
    cursor:pointer;
}

/* TEXTO INDICADOR */
.music-hint{
    position:absolute;
    top:90px;
    right:10px;
    color:white;
    font-size:12px;
    opacity:0.8;
    z-index:6;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{opacity:0.3;}
    50%{opacity:1;}
    100%{opacity:0.3;}
}

/* CORAÇÕES */
.heart{
    position:absolute;
    color:rgba(255,0,80,0.6);
    animation:cair linear infinite;
    z-index:1;
}

@keyframes cair{
    0%{
        transform:translateY(-10vh) scale(1);
        opacity:1;
    }
    100%{
        transform:translateY(110vh) scale(1.5);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="slideshow-container">

<button class="music-btn" onclick="toggleMusic()">🎵</button>
<div class="music-hint">toque 🎵</div>

<!-- SLIDES -->
<div class="mySlides active"><img src="https://lh3.googleusercontent.com/u/0/d/1Aiv7jlcJofdfB5UAH_OgH3EK6OMT0Tb9"></div>
<div class="mySlides"><img src="https://lh3.googleusercontent.com/u/0/d/14XnBecqBw5M7zBYLi9oflWshnzPGWhyU"></div>
<div class="mySlides"><img src="https://lh3.googleusercontent.com/u/0/d/1h157paw7MwPRkG-_zPoxbT43t6u4Virj"></div>
<div class="mySlides"><img src="https://lh3.googleusercontent.com/u/0/d/18CFXy7S0cnk6jaC3ssAgYud3d7gKJ8e9"></div>
<div class="mySlides"><img src="https://lh3.googleusercontent.com/u/0/d/1lHoH1y9AzUlmYjo6QXkbKiuPiqeH0Bpj"></div>
<div class="mySlides"><img src="https://lh3.googleusercontent.com/u/0/d/1QXXgi4Da9WYgV9nx60k735RYmH6lsiok"></div>
<div class="mySlides"><img src="https://lh3.googleusercontent.com/u/0/d/1JNh72TtVanKnJQol0uDFrJPFe7oO9OTs"></div>
<div class="mySlides"><img src="https://lh3.googleusercontent.com/u/0/d/1GZUIQIF-X1FQ2dcqmCtIdlw-Qktdc_c2"></div>    
<div class="mySlides"><img src="https://lh3.googleusercontent.com/u/0/d/1mzmRlb_42YrgVOQ95dStDEdTEmQx8BzW"></div>
<div class="mySlides"><img src="https://lh3.googleusercontent.com/u/0/d/1-4L8aMN0A71RuYYqJZKRa9iz8LVS3gKK"></div>

<div class="casal" id="casal">PHELIPE & VANESSA</div>
<div class="texto" id="texto"></div>

<div class="final" id="final">
    NOSSA HISTÓRIA
    <div class="sub">Para sempre começa agora ❤️</div>
</div>

</div>

<audio id="musica" loop preload="auto">
<source src="https://dl.dropboxusercontent.com/scl/fi/baus93geh0hle1pb50rok/02-Vou-Te-Amar-Cigana-Mentes-Tao-Bem.mp3?rlkey=lrrw2c9fad5ex7l2htqmpnojt&st=i2th53d9">
</audio>

<script>
const frases=[
"Em um mundo comum...",
"nada parecia diferente.",
"até você aparecer...",
"e tudo ganhar sentido.",
"não foi sorte...",
"não foi acaso...",
"foi destino.",
"foi você.",
"foi nós.",
"Phelipe & Vanessa ❤️"
];

let i=0,slide=0;
const slides=document.querySelectorAll(".mySlides");
const texto=document.getElementById("texto");
const final=document.getElementById("final");
const casal=document.getElementById("casal");

/* INTRO */
setTimeout(()=>casal.style.opacity=1,1500);
setTimeout(()=>casal.style.opacity=0,4000);

/* TRAILER */
function rodar(){
    if(i<frases.length){
        slides.forEach(s=>s.classList.remove("active"));
        slide=(slide+1)%slides.length;
        slides[slide].classList.add("active");

        texto.style.opacity=0;
        setTimeout(()=>{
            texto.textContent=frases[i];
            texto.style.opacity=1;
        },300);

        i++;
        let tempo=i<5?2500:1800;
        setTimeout(rodar,tempo);
    } else {
        texto.style.opacity=0;
        setTimeout(()=>final.style.opacity=1,1500);
    }
}
setTimeout(rodar,4500);

/* CORAÇÕES */
function criarCoracao(){
    const h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(Math.random()*20+10)+"px";
    h.style.animationDuration=(Math.random()*3+3)+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
}
setInterval(criarCoracao,300);

/* MÚSICA */
const audio=document.getElementById("musica");

function toggleMusic(){
    if(audio.paused){
        audio.volume=0;
        audio.play();
        let v=0;
        let fade=setInterval(()=>{
            v+=0.05;
            audio.volume=v;
            if(v>=1) clearInterval(fade);
        },100);
    } else audio.pause();
}

document.addEventListener("click",()=>audio.play(),{once:true});
</script>

</body>
</html>
